<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JuilienH | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 3.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: #f0f6fc;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .profile-btn {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .profile-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .repo-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, border-color 0.2s;
        }

        .repo-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
        }

        .repo-title {
            font-size: 1.2rem;
            margin: 0 0 0.5rem 0;
        }

        .repo-title a {
            color: var(--accent-color);
            text-decoration: none;
            word-break: break-word;
        }

        .repo-title a:hover {
            text-decoration: underline;
        }

        .repo-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .repo-meta {
            display: flex;
            font-size: 0.8rem;
            color: var(--text-muted);
            gap: 1rem;
            align-items: center;
        }

        .lang-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            background-color: var(--accent-color);
            vertical-align: middle;
            margin-right: 4px;
        }

        .loading {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 3rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="user-name">JuilienH</h1>
            <p id="user-bio">Loading GitHub profile information...</p>
            <a href="https://github.com/JuilienH" target="_blank" class="profile-btn">View on GitHub</a>
        </header>

        <main>
            <div class="repo-grid" id="repo-box">
                <div class="loading">Fetching repositories from GitHub...</div>
            </div>
        </main>
    </div>

    <script>
        const username = 'JuilienH'; 

        async function fetchRepos() {
            const repoBox = document.getElementById('repo-box');
            try {
                // Fetch profile data
                const userRes = await fetch(`https://api.github.com/users/${username}`);
                if(userRes.ok) {
                    const userData = await userRes.json();
                    if(userData.name) document.getElementById('user-name').innerText = userData.name;
                    if(userData.bio) document.getElementById('user-bio').innerText = userData.bio;
                }

                // Fetch repositories (sorted by most recently updated)
                const repoRes = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`);
                const repos = await repoRes.json();
                
                repoBox.innerHTML = ''; 

                // Filters out repositories you've forked so your original work shines
                const mySources = repos.filter(repo => !repo.fork);

                if (mySources.length === 0) {
                    repoBox.innerHTML = '<div class="loading">No public repositories found.</div>';
                    return;
                }

                mySources.forEach(repo => {
                    const card = document.createElement('div');
                    card.className = 'repo-card';
                    
                    card.innerHTML = `
                        <div>
                            <h3 class="repo-title">
                                <a href="${repo.html_url}" target="_blank">${repo.name}</a>
                            </h3>
                            <p class="repo-desc">${repo.description || 'No description provided.'}</p>
                        </div>
                        <div class="repo-meta">
                            ${repo.language ? `<span><span class="lang-dot"></span>${repo.language}</span>` : ''}
                            <span>⭐ ${repo.stargazers_count}</span>
                        </div>
                    `;
                    repoBox.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                repoBox.innerHTML = '<div class="loading">Oops! Failed to load repositories.</div>';
            }
        }

        fetchRepos();
    </script>
</body>
</html>
